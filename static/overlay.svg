<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 629" preserveAspectRatio="none">
  <defs>
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a07828" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#a07828" stop-opacity="0.55"/>
      <stop offset="80%"  stop-color="#a07828" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a07828" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Top bridge ──────────────────────────────────────────── -->
  <!-- Thin bar spanning full width -->
  <rect x="0"   y="0" width="450" height="36" fill="#0c1018"/>
  <!-- Left pillar covering cost -->
  <rect x="0"   y="36" width="78"  height="54" fill="#0c1018"/>
  <!-- Right pillar covering pitch -->
  <rect x="372" y="36" width="78"  height="54" fill="#0c1018"/>

  <!-- COST placeholder -->
  <circle cx="40" cy="46" r="26"
          fill="none" stroke="#7a5c1e" stroke-width="1" opacity="0.5"/>
  <text x="40" y="50" text-anchor="middle"
        font-family="Georgia,serif" font-size="10" font-weight="bold"
        fill="#a07828" opacity="0.45">COST</text>

  <!-- PITCH placeholder -->
  <circle cx="410" cy="46" r="26"
          fill="none" stroke="#7a5c1e" stroke-width="1" opacity="0.5"/>
  <text x="410" y="50" text-anchor="middle"
        font-family="Georgia,serif" font-size="9" font-weight="bold"
        fill="#a07828" opacity="0.45">PITCH</text>

  <!-- Corner ornaments -->
  <path d="M10,10 L10,24 L24,10" fill="none" stroke="#c8882a" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
  <path d="M440,10 L440,24 L426,10" fill="none" stroke="#c8882a" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>

  <!-- ── Bottom block ─────────────────────────────────────────── -->
  <rect x="0" y="400" width="450" height="229" fill="#0c1018"/>

  <!-- Top rule of bottom block -->
  <rect x="0" y="400" width="450" height="1" fill="url(#ruleGrad)"/>

  <!-- ATK placeholder — bottom-left -->
  <rect x="28"  y="555" width="58" height="30" rx="4"
        fill="none" stroke="#7a5c1e" stroke-width="1" opacity="0.5"/>
  <text x="57"  y="575" text-anchor="middle"
        font-family="Georgia,serif" font-size="13" font-weight="bold"
        fill="#a07828" opacity="0.4">ATK</text>

  <!-- DEF placeholder — bottom-right -->
  <rect x="364" y="555" width="58" height="30" rx="4"
        fill="none" stroke="#7a5c1e" stroke-width="1" opacity="0.5"/>
  <text x="393" y="575" text-anchor="middle"
        font-family="Georgia,serif" font-size="13" font-weight="bold"
        fill="#a07828" opacity="0.4">DEF</text>

  <!-- Bottom corner ornaments -->
  <path d="M10,619 L10,605 L24,619" fill="none" stroke="#c8882a" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
  <path d="M440,619 L440,605 L426,619" fill="none" stroke="#c8882a" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>

  <!-- Bottom label -->
  <text x="225" y="616" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="9.5" fill="#a07828" opacity="0.45" letter-spacing="5.5">FLESH AND BLOOD</text>
</svg>
